<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Associativa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 600px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; text-align: center; font-size: 28px; }
        table { width: 100%; border-collapse: collapse; color: #555; }
        td.term { font-weight: bold; color: #667eea; width: 35%; padding: 8px 0; }
        td.value { padding: 8px 0; color: #666; }
        .back-link { display: inline-block; margin-top: 30px; padding: 10px 20px; background-color: #667eea; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: background-color 0.3s ease; }
        .back-link:hover { background-color: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lista Associativa</h1>
        <p style="color:#555; margin-bottom:16px;">Exemplo de lista associativa (chave : valor).</p>
        <table>
            <tr>
                <td class="term">Nome</td>
                <td class="value">João Silva</td>
            </tr>
            <tr>
                <td class="term">Idade</td>
                <td class="value">28 anos</td>
            </tr>
            <tr>
                <td class="term">Cidade</td>
                <td class="value">Juiz de Fora</td>
            </tr>
            <tr>
                <td class="term">Curso</td>
                <td class="value">Ciência da Computação</td>
            </tr>
            <tr>
                <td class="term">Hobby</td>
                <td class="value">Fotografia</td>
            </tr>
        </table>
        <a href="../index.html" class="back-link">Voltar para Home</a>
    </div>
</body>
</html>
